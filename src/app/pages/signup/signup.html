<div class="auth-page-wrapper">
  <div class="auth-side-image">
    <div class="auth-branding-content">
      <h1 class="auth-branding-title">Join Our<br>Community</h1>
      <p class="auth-branding-text">Start your journey with us today and gain access to advanced tools and features.</p>
    </div>
  </div>

  <div class="auth-side-form">
    <div class="auth-container">
      <div class="glass-card auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join us today and get started</p>

        <form (ngSubmit)="signup()">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input 
              type="text" 
              name="username"
              class="form-input" 
              placeholder="Enter your username"
              [(ngModel)]="signupData.Username"
              required>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input 
              type="password" 
              name="password"
              class="form-input" 
              placeholder="••••••••"
              [(ngModel)]="signupData.Password"
              required>
          </div>

          <div class="form-group">
            <label class="form-label">Role</label>
            <select 
              name="role"
              class="form-input"
              [(ngModel)]="signupData.Role"
              required>
              <option value="" disabled selected>Select a role</option>
              <option value="admin-add">Admin (Add Access)</option>
              <option value="admin-delete">Admin (Delete Access)</option>
            </select>
          </div>

          <button type="submit" class="btn-primary">Sign Up</button>
        </form>

        <div class="auth-footer">
          Already have an account? <a routerLink="/" class="auth-link">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
