<div class="auth-page-wrapper">
  <div class="auth-side-image">
    <div class="auth-branding-content">
      <h1 class="auth-branding-title">Welcome to<br>Our Platform</h1>
      <p class="auth-branding-text">Experience the next generation of employee management with our secure and intuitive dashboard.</p>
    </div>
  </div>

  <div class="auth-side-form">
    <div class="auth-container">
      <div class="glass-card auth-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Please enter your details to sign in</p>

        <form (ngSubmit)="login()">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input 
              type="text" 
              name="username"
              class="form-input" 
              placeholder="Enter your username"
              [(ngModel)]="loginData.Username"
              required>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input 
              type="password" 
              name="password"
              class="form-input" 
              placeholder="••••••••"
              [(ngModel)]="loginData.Password"
              required>
          </div>

          <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a routerLink="/signup" class="auth-link">Sign up</a>
        </div>
      </div>
    </div>
  </div>
</div>
